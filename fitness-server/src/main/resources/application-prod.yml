# 生产环境配置 - Docker Compose部署
spring:
  datasource:
    url: jdbc:mysql://mysql:3306/fitness?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: redis
    port: 6379
    password:
    database: 0

# 文件上传路径(Docker容器内)
upload:
  path: /app/uploads

# 日志配置
logging:
  level:
    root: INFO
    com.fitness: DEBUG
